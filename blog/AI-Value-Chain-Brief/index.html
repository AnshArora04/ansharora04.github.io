<style>
  :root{--paper:#f4eee1;--ink:#211d16;--muted:#6b6453;--accent:#15534f;--rule:#cabfa4}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}

  form{display:flex;flex-direction:column;gap:12px}
  input[type=password]{padding:12px 14px;border:1px solid var(--rule);background:#fff;font-size:15px;color:var(--ink);outline:none}
  input[type=password]:focus{border-color:var(--accent)}
  button{padding:12px 14px;border:none;background:var(--accent);color:#faf6ec;font-size:14px;font-weight:600;letter-spacing:.02em;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#9c3b34;font-size:13px;min-height:18px}
  .ft{margin-top:18px;font-size:11px;color:var(--muted)}
</style>
